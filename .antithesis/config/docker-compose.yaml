services:
  corrosion1:
    container_name: corrosion1
    hostname: corrosion1
    image: corrosion
    environment:
      - RUST_LOG=corro=debug
      - LD_LIBRARY_PATH=/usr/lib/antithesis/lib
    volumes: 
      - ./volumes/corrosion1:/var/lib/corrosion

  corrosion2:
    container_name: corrosion2
    hostname: corrosion2
    image: corrosion
    volumes: 
      - ./volumes/corrosion2:/var/lib/corrosion

  corrosion3:
    container_name: corrosion3
    hostname: corrosion3
    image: corrosion
    volumes: 
      - ./volumes/corrosion3:/var/lib/corrosion

  corro-client:
    container_name: corro-client
    hostname: corro-client
    image: corro-client
